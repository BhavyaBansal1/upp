<div class="container mt-4">

  <!-- Center the content -->
  <div class="row justify-content-center">

    <!-- Control width here -->
    <div class="col-md-6">

      <!-- STOCKS -->
      <div class="card mb-3">
        <div class="card-header bg-primary text-white">
          Stocks
        </div>

        <table class="table table-sm mb-0">

          <thead class="table-dark">
            <tr>
              <th class="text-start">Holdings</th>
              <th class="text-center">Quantity</th>
              <th class="text-end">Time</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let item of getstocks()">
              <td class="text-start">{{item.stockName}}</td>
              <td class="text-center">{{item.quantity}}</td>
              <td class="text-end">
                {{item.currenttime | date:'yyyy-MM-dd HH:mm:ss'}}
              </td>
            </tr>

            <!-- Empty -->
            <tr *ngIf="getstocks().length === 0">
              <td colspan="3" class="text-center text-muted">
                No stock holdings
              </td>
            </tr>
          </tbody>

        </table>
      </div>

      <!-- MUTUAL FUNDS -->
      <div class="card">
        <div class="card-header bg-success text-white">
          Mutual Funds
        </div>

        <table class="table table-sm mb-0">

          <thead class="table-dark">
            <tr>
              <th class="text-start">Holdings</th>
              <th class="text-center">Quantity</th>
              <th class="text-end">Time</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let mf of getmutualfund()">
              <td class="text-start">{{mf.stockName}}</td>
              <td class="text-center">{{mf.quantity}}</td>
              <td class="text-end">
                {{mf.currenttime | date:'yyyy-MM-dd HH:mm:ss'}}
              </td>
            </tr>

            <!-- Empty -->
            <tr *ngIf="getmutualfund().length === 0">
              <td colspan="3" class="text-center text-muted">
                No mutual fund holdings
              </td>
            </tr>
          </tbody>

        </table>
      </div>

    </div>
  </div>

</div>

<router-outlet></router-outlet>
