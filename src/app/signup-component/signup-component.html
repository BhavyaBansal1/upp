<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">

      <div class="card shadow p-4">

        <h3 class="text-center mb-4">Signup</h3>

        <!-- Email -->
        <div class="mb-3">
          <input type="email" class="form-control"  [(ngModel)]="email" placeholder="Email"  />
        </div>

        <!-- Password -->
        <div class="mb-3">
          <input   type="password" class="form-control" [(ngModel)]="password" placeholder="Password"  />
        </div>
        <div class="mb-3">
      <label class="form-label">Role</label>
      <select class="form-control" [(ngModel)]="Role">
        <option value="Trader">Trader</option>
        <option value="NonTrader">NonTrader</option>
      </select>
    </div>

        <!-- Login Button -->
        <button class="btn btn-primary w-100 mb-2" (click)="signup()">
          Login
        </button>
        <!-- Error Message -->
        <p *ngIf="error" class="text-danger text-center mt-2">
          {{ error }}
        </p>

      </div>

    </div>
  </div>
</div>
