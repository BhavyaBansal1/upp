<div class="container mt-4">

  <!-- 🔷 Pie Chart Section -->
  <div class="row justify-content-center mb-4">

    <div class="col-md-5">

      <div class="card p-3 shadow-sm text-center">

        <h6>5 Month Returns</h6>

        <!-- 🥧 Small Centered Pie Chart -->
        <div style="display:flex; justify-content:center;">
          <div style="width:200px; height:200px;">
            <canvas #pieChartCanvas></canvas>
          </div>
        </div>

        <!-- 📊 Horizontal Monthly Data -->
        <div class="mt-3 d-flex justify-content-around flex-wrap text-center">

          <div *ngFor="let m of months; let i = index" class="mx-2">
            
            <!-- Optional color indicator -->
            <div>
              <span style="display:inline-block;width:10px;height:10px;
              background-color: {{ ['#FF6384','#36A2EB','#FFCE56','#4BC0C0','#9966FF'][i] }}
              margin-right:5px"></span>

              <strong>{{ m }}</strong>
            </div>

            <div>{{ monthlyReturns[i] }}%</div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <div class="row">

    <div 
      class="col-md-3 mb-4"
      *ngFor="let stock of stocks; let i = index"
    >
      <div class="card p-3 shadow-sm">

        <h6 class="text-center">
          {{stock.name}} - 5 Year Progress Chart
        </h6>

        <canvas #chartCanvas style="height:200px;"></canvas>

      </div>
    </div>

  </div>

</div>
