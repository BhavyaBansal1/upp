<div class="container mt-4">

  <!-- 📈 1. 5 YEAR PROGRESS (GRID) -->
  <div class="row mb-4">

    <div 
      class="col-md-3 mb-3"
      *ngFor="let stock of stocks; let i = index"
    >
      <div class="card p-3 shadow-sm h-100">

        <h6 class="text-center">
          {{stock.name}} - 5 Year Progress Chart
        </h6>

        <div style="height:200px;">
          <canvas #chartCanvas></canvas>
        </div>

      </div>
    </div>

  </div>

<div class="row mb-4">

  <!-- 🥧 Pie Chart -->
  <div class="col-12 mb-3">
    <div class="card p-3 shadow-sm text-center">

      <h6>5 Month Returns</h6>

      <div class="d-flex justify-content-center">
        <div style="width:200px; height:200px;">
          <canvas #pieChartCanvas></canvas>
        </div>
      </div>

      <div class="mt-3 d-flex justify-content-around flex-wrap text-center">
        <div *ngFor="let m of months; let i = index" class="mx-2">
          <div>
            <span style="display:inline-block;width:10px;height:10px;
            background-color: {{ ['#FF6384','#36A2EB','#FFCE56','#4BC0C0','#9966FF'][i] }};
            margin-right:5px"></span>
            <strong>{{ m }}</strong>
          </div>
          <div>{{ monthlyReturns[i] }}%</div>
        </div>
      </div>

    </div>
  </div>


  <div class="col-12 mb-3">
  <div class="card p-3 shadow-sm text-center">

    <h6>Advisory Tips</h6>

    <!-- Bigger + Centered -->
    <div class="d-flex justify-content-center align-items-center" style="height:400px;">
      <div style="width:600px; height:350px;">
        <canvas #advisorychartcanvas></canvas>
      </div>
    </div>

  </div>
</div>


  <div class="col-12 mb-3">
    <div class="card p-3 shadow-sm text-center">

      <h6>User Segregation</h6>

      <div class="d-flex justify-content-center">
        <div style="width:200px;">
          <canvas #segmentchartcanvas></canvas>

      <div class="mt-2 d-flex justify-content-center align-items-center" style="gap:10px; flex-wrap:nowrap;">

  <span class="px-3 py-1 text-muted"
        style="border:1px solid #ddd; border-radius:20px; white-space:nowrap;">
    <strong>Risk:</strong> {{ riskProfilech() }}
  </span>

  <span class="px-3 py-1 text-muted"
        style="border:1px solid #ddd; border-radius:20px; white-space:nowrap;">
    <strong>Behavior:</strong> {{ tradingActivitySegment() }}
  </span>

</div>
        </div>
      </div>

    </div>
  </div>

</div>
